# ArgoCD dashboard - uses Prometheus datasource (ArgoCD app metrics)
# If ArgoCD is installed with metrics, add scrape config for argocd-metrics
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-argocd
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    grafana_dashboard: "1"
data:
  argocd.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"}, "mappings": [], "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}},
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "id": 1,
          "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "pluginVersion": "10.0.0",
          "targets": [{"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": "count(argocd_app_info)", "refId": "A"}],
          "title": "ArgoCD Applications",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"}, "mappings": [{"options": {"Synced": {"color": "green", "index": 0}}, "type": "value"}, {"options": {"OutOfSync": {"color": "red", "index": 0}}, "type": "value"}], "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}},
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "id": 2,
          "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "pluginVersion": "10.0.0",
          "targets": [{"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": "count(argocd_app_info{sync_status=\"Synced\"})", "refId": "A"}],
          "title": "Apps Synced",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"}, "mappings": [], "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}]}},
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "id": 3,
          "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "pluginVersion": "10.0.0",
          "targets": [{"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": "count(argocd_app_info{sync_status=\"OutOfSync\"})", "refId": "A"}],
          "title": "Apps OutOfSync",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"}, "custom": {"drawStyle": "line", "fillOpacity": 10}, "unit": "short"},
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 4},
          "id": 4,
          "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}},
          "targets": [{"datasource": {"type": "prometheus", "uid": "${datasource}"}, "expr": "argocd_app_info", "legendFormat": "{{ name }} ({{ sync_status }})", "refId": "A"}],
          "title": "ArgoCD Applications status",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["argocd"],
      "templating": {
        "list": [
          {
            "current": {"selected": true, "text": "Prometheus", "value": "Prometheus"},
            "hide": 0,
            "includeAll": false,
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "type": "datasource"
          }
        ]
      },
      "time": {"from": "now-1h", "to": "now"},
      "timepicker": {},
      "timezone": "",
      "title": "ArgoCD Overview",
      "uid": "argocd-overview",
      "version": 1,
      "weekStart": ""
    }
